<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notation reference — ML Tutor</title>

  <meta name="ml:root" content="./">

  <link rel="stylesheet" href="assets/css/site.css">
  <script defer src="assets/js/site.js"></script>
</head>
<body>
<main>
  <h1>How to read the symbols</h1>
  <p class="lede">Every symbol used on this site: its name, how to say it out
  loud, and what it means in machine learning. Search by name, by meaning, or
  by description — "curly d", "that E-looking symbol", and "upside-down
  triangle" all work.</p>

  <div class="glossary-controls">
    <input type="search" id="notation-filter"
           placeholder="Try “theta”, “sum”, “curly d”, “E-looking”…"
           aria-label="Filter notation entries">
    <p class="count" id="notation-count"></p>
  </div>

  <div id="notation-app"><p><em>Loading… (needs the dev server:
  <code>npm run dev</code>)</em></p></div>

  <script>
  (function () {
    "use strict";
    document.addEventListener("DOMContentLoaded", async () => {
      const app = document.getElementById("notation-app");
      let data;
      try {
        const res = await fetch("data/notation.json");
        data = await res.json();
      } catch {
        return; // the loading note stays
      }

      app.innerHTML = "";
      const rows = [];
      for (const group of Object.values(data)) {
        const h = document.createElement("h2");
        h.textContent = group.title;
        app.appendChild(h);
        const table = document.createElement("table");
        table.className = "ref";
        table.innerHTML =
          "<thead><tr><th>Symbol</th><th>Say it</th><th>What it means here</th></tr></thead>";
        const tbody = document.createElement("tbody");
        for (const e of group.entries) {
          const tr = document.createElement("tr");
          const taught = e.taughtIn
            ? ` <a href="${e.taughtIn.href}">→ ${e.taughtIn.title}</a>` : "";
          tr.innerHTML =
            `<td class="glyph">${e.sym}</td>` +
            `<td><strong>${e.name}</strong><br><span style="color:var(--text-soft)">say: “${e.say}”</span></td>` +
            `<td>${e.means}${taught}</td>`;
          tbody.appendChild(tr);
          rows.push({
            tr, h,
            hay: `${e.sym} ${e.name} ${e.say} ${e.means} ${(e.aliases || []).join(" ")}`.toLowerCase(),
          });
        }
        table.appendChild(tbody);
        app.appendChild(table);
      }

      const input = document.getElementById("notation-filter");
      const count = document.getElementById("notation-count");
      function apply() {
        const q = input.value.trim().toLowerCase();
        let shown = 0;
        for (const r of rows) {
          const hit = !q || r.hay.includes(q);
          r.tr.hidden = !hit;
          if (hit) shown++;
        }
        // hide group headers whose tables are empty
        app.querySelectorAll("h2").forEach((h) => {
          const table = h.nextElementSibling;
          h.hidden = table.hidden =
            ![...table.querySelectorAll("tbody tr")].some((tr) => !tr.hidden);
        });
        count.textContent = q ? `${shown} of ${rows.length} symbols` : `${rows.length} symbols`;
      }
      input.addEventListener("input", apply);
      apply();
    });
  })();
  </script>
</main>
</body>
</html>
